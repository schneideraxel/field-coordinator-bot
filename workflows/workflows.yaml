      - action: foreach_rows
        sub_workflow: track_midline2b_sub_principal

  track_midline2b_sub:
    tasks:
      - action: sync_issue
        repo: "{repo}"
        project: "{project}"
        title: "{case}"
        body: "{comment}"
        options: skip
      - action: sync_project
        repo: "{repo}"
        project: "{project}"
        options: update

