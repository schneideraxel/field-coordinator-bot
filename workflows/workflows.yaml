workflows:

  hfc_test:
    tasks:
      - action: run_script
        script: r/app/hfc_mock.R
      - action: foreach_rows
        sub_workflow: hfc_sub_workflow

  hfc_sub_workflow:
    tasks:
      - action: sync_issue
        repo: "{repo}"
        project: "{project}"
        title: "{case}"
        body: "{comment}"
        options: skip
      - action: sync_project
        repo: "{repo}"
        project: "{project}"
        options: skip

  monitoring_dgi_zones:
    tasks:
      - action: run_script
        script: r/monitoring/track_fieldwork_progress.R
      - action: foreach_rows
        sub_workflow: monitoring_sub_workflow_zones

  monitoring_sub_workflow_zones:
    tasks:
      - action: sync_issue
        repo: "{repo}"
        project: "{project}"
        title: "{case}"
        body: "{comment}"
        options: update
      - action: sync_project
        repo: "{repo}"
        project: "{project}"
        options: update

  monitoring_dgi_enums:
